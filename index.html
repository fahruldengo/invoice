<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledgerine — Invoice & Kwitansi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12203a;          /* navy tinta */
  --ink-soft:#2b3d5c;
  --paper:#f7f4ec;        /* kertas */
  --paper-2:#efe9db;
  --gold:#b6863c;         /* emas tembaga */
  --gold-soft:#e9d9b6;
  --line:#dcd4c2;
  --white:#fffdf8;
  --green:#2f7d55;
  --green-bg:#e3f0e7;
  --red:#a8443a;
  --red-bg:#f4e2df;
  --amber:#9a6b1f;
  --amber-bg:#f5ead0;
  --shadow:0 1px 2px rgba(18,32,58,.06),0 8px 30px rgba(18,32,58,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.serif{font-family:'Fraunces',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.01em}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
#login::before{content:"";position:absolute;inset:0;background:
  radial-gradient(1200px 500px at 80% -10%, rgba(182,134,60,.22), transparent 60%),
  radial-gradient(800px 400px at 10% 110%, rgba(182,134,60,.12), transparent 60%)}
.login-card{position:relative;background:var(--paper);border-radius:18px;padding:44px 40px;width:100%;max-width:390px;box-shadow:0 30px 80px rgba(0,0,0,.45)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.brand-mark{width:38px;height:38px;border-radius:10px;background:var(--ink);display:grid;place-items:center;color:var(--gold);font-family:'Fraunces',serif;font-weight:700;font-size:20px}
.brand-name{font-family:'Fraunces',serif;font-size:23px;font-weight:600}
.login-card h2{font-size:15px;font-weight:600;font-family:'Inter';color:var(--ink-soft);margin:22px 0 4px}
.login-card p.sub{font-size:13px;color:#7b756a;margin-bottom:22px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--white);color:var(--ink);transition:.15s}
.field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(182,134,60,.15)}
.btn-primary{width:100%;padding:13px;background:var(--ink);color:var(--gold-soft);border-radius:10px;font-weight:600;font-size:14px;transition:.15s;letter-spacing:.02em}
.btn-primary:hover{background:#0c1830}
.login-err{color:var(--red);font-size:13px;margin-top:12px;text-align:center;min-height:18px}

/* ---------- SHELL ---------- */
#app{display:none;min-height:100vh}
.topbar{background:var(--ink);color:var(--paper);padding:0 26px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar .brand-name{color:var(--paper);font-size:20px}
.topbar .brand-mark{width:32px;height:32px;font-size:17px;background:rgba(255,255,255,.08)}
.topbar .right{display:flex;align-items:center;gap:16px;font-size:13px}
.pill-user{display:flex;align-items:center;gap:8px;color:var(--gold-soft)}
.logout{color:var(--paper);opacity:.7;font-size:13px;padding:6px 12px;border:1px solid rgba(255,255,255,.2);border-radius:8px}
.logout:hover{opacity:1;border-color:var(--gold)}

.layout{display:flex}
.nav{width:210px;padding:22px 14px;border-right:1px solid var(--line);min-height:calc(100vh - 60px);position:sticky;top:60px;height:calc(100vh - 60px)}
.nav-group{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#9a9384;margin:16px 12px 8px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--ink-soft);font-size:14px;font-weight:500;width:100%;text-align:left;transition:.12s;margin-bottom:2px}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.7}
.nav-item:hover{background:var(--paper-2)}
.nav-item.active{background:var(--ink);color:var(--paper)}
.nav-item.active svg{opacity:1}

.main{flex:1;padding:30px 34px;max-width:1180px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px}
.page-head .eyebrow{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.page-head h1{font-size:30px}
.page-head p{color:#7b756a;font-size:14px;margin-top:4px}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.stat .label{font-size:12px;color:#7b756a;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.stat .val{font-family:'Fraunces',serif;font-size:27px;font-weight:600;margin-top:6px}
.stat .val.sm{font-size:22px}
.stat.accent{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.stat.accent .label{color:var(--gold-soft)}
.stat.accent .val{color:var(--white)}

/* buttons */
.btn{padding:10px 18px;border-radius:10px;font-weight:600;font-size:13.5px;transition:.14s;display:inline-flex;align-items:center;gap:7px}
.btn svg{width:15px;height:15px}
.btn.dark{background:var(--ink);color:var(--gold-soft)}
.btn.dark:hover{background:#0c1830}
.btn.gold{background:var(--gold);color:#fff}
.btn.gold:hover{background:#a4762f}
.btn.ghost{background:var(--white);color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.danger{background:var(--red-bg);color:var(--red)}
.btn.danger:hover{background:#eecfca}

/* table / card */
.card{background:var(--white);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:17px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search{position:relative}
.search input{padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:var(--paper);width:220px}
.search input:focus{outline:none;border-color:var(--gold);background:var(--white)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9a9384}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9a9384;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--paper)}
td{padding:13px 20px;border-bottom:1px solid var(--paper-2);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:.1s}
tbody tr:hover{background:var(--paper)}
td .name{font-weight:600}
td .muted{color:#9a9384;font-size:12.5px}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.badge.paid{background:var(--green-bg);color:var(--green)}
.badge.unpaid{background:var(--red-bg);color:var(--red)}
.badge.partial{background:var(--amber-bg);color:var(--amber)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--ink-soft);border:1px solid var(--line);background:var(--white)}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.icon-btn svg{width:15px;height:15px}

.empty{padding:50px 20px;text-align:center;color:#9a9384}
.empty svg{width:38px;height:38px;opacity:.4;margin-bottom:10px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(18,32,58,.5);backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--paper);border-radius:16px;width:100%;max-width:640px;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:pop .18s ease}
.modal.wide{max-width:860px}
@keyframes pop{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:20px}
.modal-head .x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:#9a9384;font-size:20px}
.modal-head .x:hover{background:var(--paper-2);color:var(--ink)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:var(--white);border-radius:0 0 16px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{margin-bottom:15px}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--white)}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(182,134,60,.13)}

/* invoice line items */
.li-row{display:grid;grid-template-columns:1fr 78px 118px 118px 34px;gap:8px;align-items:center;margin-bottom:8px}
.li-head{display:grid;grid-template-columns:1fr 78px 118px 118px 34px;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9a9384;margin-bottom:8px;padding:0 2px}
.li-row input,.li-row select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--white)}
.li-del{width:32px;height:32px;border-radius:7px;background:var(--red-bg);color:var(--red);display:grid;place-items:center}
.li-total{display:flex;flex-direction:column;gap:4px;margin-top:16px;padding-top:16px;border-top:1px dashed var(--line)}
.li-total .r{display:flex;justify-content:space-between;font-size:14px;color:var(--ink-soft)}
.li-total .r.grand{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--ink);padding-top:8px;margin-top:4px;border-top:1px solid var(--line)}

/* checklist for receipt */
.inv-pick{border:1px solid var(--line);border-radius:10px;max-height:280px;overflow-y:auto;background:var(--white)}
.inv-pick label{display:flex;align-items:center;gap:12px;padding:12px 15px;border-bottom:1px solid var(--paper-2);cursor:pointer}
.inv-pick label:last-child{border-bottom:none}
.inv-pick label:hover{background:var(--paper)}
.inv-pick input[type=checkbox]{width:18px;height:18px;accent-color:var(--gold)}
.inv-pick .ip-info{flex:1}
.inv-pick .ip-info .n{font-weight:600;font-size:14px}
.inv-pick .ip-info .d{font-size:12px;color:#9a9384}
.inv-pick .ip-amt{font-family:'JetBrains Mono',monospace;font-weight:600}

/* toast + loader */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);padding:13px 22px;border-radius:11px;font-size:14px;font-weight:500;box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:200;opacity:0;transition:.28s;display:flex;align-items:center;gap:10px}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.err{background:var(--red)}
#loader{position:fixed;inset:0;background:rgba(247,244,236,.7);backdrop-filter:blur(2px);z-index:150;display:none;align-items:center;justify-content:center}
#loader.show{display:flex}
.spin{width:38px;height:38px;border:3px solid var(--gold-soft);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ===== DOKUMEN CETAK — gaya CV Vidya Amaliah ===== */
.doc{background:#fff;color:#111;font-family:Arial,Helvetica,sans-serif;padding:38px 40px;width:800px;margin:0 auto;font-size:13px;line-height:1.4}
.va-logo{display:flex;align-items:center;gap:9px}
.va-logo .mark{width:34px;height:34px;flex:none}
.va-logo .txt{font-weight:700;font-size:22px;color:#c0392b;letter-spacing:.3px}

/* ---- INVOICE ---- */
.inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.inv-company{max-width:470px}
.inv-company .cname{font-size:19px;font-weight:700;margin:10px 0 6px}
.inv-company .cline{font-size:11.5px;color:#222;line-height:1.5}
.inv-fak{margin-top:44px;font-size:12.5px}
.inv-fak table{border-collapse:collapse}
.inv-fak td{padding:2px 6px;vertical-align:top}
.inv-fak td.lb{font-weight:700}
.sep-line{height:2px;background:#111;margin:6px 0 18px;border:none}
.thin-line{border:none;border-top:1px solid #111;width:230px;margin:26px 0 0}

.inv-parties{display:flex;gap:16px;margin:16px 0 10px}
.inv-box{border:1px solid #111;padding:9px 11px;font-size:12px;line-height:1.5}
.inv-box.cust{flex:1.6}
.inv-box.period{flex:1;display:flex;align-items:flex-start}
.inv-box .sect{font-weight:700;font-size:12px;margin-bottom:6px;letter-spacing:.02em}
.inv-box .krow{display:flex}
.inv-box .krow .k{width:66px;flex:none}
.inv-box .krow .v{flex:1}
.pelanggan-lb{font-weight:700;font-size:12px;margin:12px 0 4px}

.inv-table{width:100%;border-collapse:collapse;margin:4px 0 0;font-size:12px}
.inv-table th{border:1px solid #111;padding:7px 8px;font-weight:700;text-align:center;background:#fff;color:#111;font-size:11.5px}
.inv-table td{border:1px solid #111;padding:8px;vertical-align:top}
.inv-table td.c{text-align:center}
.inv-table td.r{text-align:right}

.inv-sum{display:flex;justify-content:flex-end;margin-top:18px}
.inv-sum table{border-collapse:collapse;min-width:360px;font-size:12.5px}
.inv-sum td{padding:5px 4px}
.inv-sum td.r{text-align:right}
.inv-sum tr.line td{border-bottom:1px solid #111}
.inv-sum tr.total td{font-weight:700;border-top:1px solid #111}
.inv-sum tr.sisa td{font-weight:700}

.inv-pay-lb{font-weight:700;font-size:12px;margin:26px 0 6px}
.inv-bank{border:1px solid #111;font-size:12px;max-width:360px}
.inv-bank .brow{display:flex;padding:4px 9px}
.inv-bank .brow .k{width:135px;flex:none}
.inv-terbilang{border:1px solid #111;border-top:none;padding:5px 9px;font-size:12px;max-width:360px}
.inv-terbilang .h{font-weight:400}
.inv-sign{float:right;text-align:center;margin-top:18px;font-size:12.5px}
.inv-sign .nm{font-weight:700;border-top:1px solid #111;padding-top:3px;min-width:190px}

/* ---- KWITANSI ---- */
.kw-head{display:flex;justify-content:flex-end;margin-bottom:2px}
.kw-logo{text-align:right}
.kw-logo .row1{display:flex;align-items:center;gap:9px;justify-content:flex-end}
.kw-logo .txt{font-weight:700;font-size:26px;color:#c0392b}
.kw-logo .tag{font-weight:700;font-size:13px;color:#111;margin-top:2px}
.kw-rule{border:none;border-top:2px solid #d98880;margin:3px 0}
.kw-rule.b{border-top:2px solid #d98880;margin-top:2px}
.kw-title{text-align:center;font-weight:700;font-size:20px;letter-spacing:.5px;margin:20px 0 22px}
.kw-meta{font-size:14px;line-height:1.1;margin-left:6px}
.kw-meta .row{display:flex;margin-bottom:13px}
.kw-meta .row .k{width:150px;flex:none}
.kw-meta .row .c{width:12px;flex:none}
.kw-meta .row .v{flex:1}
.kw-detail{margin:4px 0 4px 176px}
.kw-detail table{border-collapse:collapse;width:100%;font-size:13.5px}
.kw-detail td{padding:5px 4px;border-bottom:1px solid #333}
.kw-detail td.no{width:26px}
.kw-detail td.amt{text-align:right;white-space:nowrap;width:130px}
.kw-foot{display:flex;justify-content:space-between;align-items:flex-start;margin-top:34px}
.kw-amount{border:1.5px solid #111;padding:11px 20px;font-size:17px;font-weight:600;border-radius:3px}
.kw-place{text-align:left;font-size:14px;padding-top:12px}
.kw-sign{text-align:center;font-size:14px;margin-top:52px;float:right}
.kw-sign .nm{font-weight:700}

@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;inset:0;padding:0}
  .doc{box-shadow:none;width:100%;padding:6mm}
  @page{size:A4;margin:12mm}
}

@media(max-width:860px){
  .nav{display:none}
  .main{padding:20px 16px}
  .grid2{grid-template-columns:1fr}
  .li-head,.li-row{grid-template-columns:1fr 60px 90px 34px}
  .li-head span:nth-child(4),.li-row .li-sub{display:none}
  .search input{width:150px}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">L</div>
      <div class="brand-name">Ledgerine</div>
    </div>
    <h2>Masuk ke akun Anda</h2>
    <p class="sub">Sistem penerbitan invoice & kwitansi pembayaran.</p>
    <div class="field">
      <label>Nama pengguna</label>
      <input id="lUser" type="text" autocomplete="username" placeholder="admin">
    </div>
    <div class="field">
      <label>Kata sandi</label>
      <input id="lPass" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()">Masuk</button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">L</div>
      <div class="brand-name">Ledgerine</div>
    </div>
    <div class="right">
      <div class="pill-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
        <span id="whoami">admin</span>
      </div>
      <button class="logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="layout">
    <nav class="nav">
      <div class="nav-group">Utama</div>
      <button class="nav-item active" data-page="dashboard" onclick="go('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</button>
      <button class="nav-item" data-page="invoices" onclick="go('invoices')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>Invoice</button>
      <button class="nav-item" data-page="receipts" onclick="go('receipts')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 1 1V2l-1 1-3-2-3 2-3-2-3 2z"/><path d="M8 8h8M8 12h5"/></svg>Kwitansi</button>
      <div class="nav-group">Data Master</div>
      <button class="nav-item" data-page="customers" onclick="go('customers')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M2 21v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1M17 3.5a4 4 0 0 1 0 7M23 21v-1a5 5 0 0 0-4-4.9"/></svg>Pelanggan</button>
      <button class="nav-item" data-page="products" onclick="go('products')">

<script>
/* =========================================================

const API_URL = (window.LEDGERINE_CONFIG && window.LEDGERINE_CONFIG.API_URL) || "";
const COMPANY = (window.LEDGERINE_CONFIG && window.LEDGERINE_CONFIG.COMPANY) || {
  name:"CV. VIDYA AMALIAH", tagline:"Strategic Business Partner Telkomsel",
  address:"Jl. Nani Wartabone Ruko Bonanza No.2, Kota Gorontalo", phone:"0811435431",
  email:"cvvidyaamaliah@gmail.com", npwp:"934538901822000", city:"Gorontalo",
  bank:{name:"PT Bank Mandiri Tbk.",branch:"Gorontalo",account:"150 00 5551333 5",holder:"CV Vidya Amaliah"},
  signer:"Farin Pohantalo", title:"General Manager"
};
/* Login: kredensial diverifikasi di backend Apps Script.
   Default fallback (jika belum set di backend): admin / admin123 */

/* ---------- state ---------- */
let DB = { customers:[], products:[], invoices:[], receipts:[] };
let SESSION = null;

/* ---------- utils ---------- */
const $ = s => document.querySelector(s);
const rp = n => "Rp " + (Number(n)||0).toLocaleString("id-ID");
const num2 = n => (Number(n)||0).toLocaleString("id-ID",{minimumFractionDigits:2,maximumFractionDigits:2}); // 22.700.000,00
const num0 = n => (Number(n)||0).toLocaleString("id-ID"); // 547.420.000
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d? new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"}) : "-";
function toast(msg,err){const t=$("#toast");t.textContent=msg;t.className=err?"err show":"show";setTimeout(()=>t.className="",2600);}
function loader(on){$("#loader").classList.toggle("show",on);}

/* ---------- API (GET-only, JSONP-safe via query params) ---------- */
async function api(action, payload){
  if(!API_URL){ return localFallback(action,payload); }
  loader(true);
  try{
    const url = API_URL + "?action=" + encodeURIComponent(action)
      + "&data=" + encodeURIComponent(JSON.stringify(payload||{}))
      + "&token=" + encodeURIComponent(SESSION?SESSION.token:"");
    const res = await fetch(url);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error||"Gagal memproses");
    return json.data;
  }catch(e){ toast(e.message,true); throw e; }
  finally{ loader(false); }
}

/* ---------- LOCAL FALLBACK (demo tanpa backend) ---------- */
function lsGet(){ try{return JSON.parse(localStorage.getItem("ledgerine")||"null");}catch(e){return null;} }
function lsSet(){ localStorage.setItem("ledgerine",JSON.stringify(DB)); }
function localFallback(action,p){
  return new Promise(res=>{
    if(action==="login"){
      if(p.user==="admin"&&p.pass==="admin123") return res({token:"local",user:"admin"});
      throw new Error("Nama pengguna atau kata sandi salah");
    }
    if(action==="bootstrap"){ const s=lsGet(); if(s)DB=s; return res(DB); }
    // mutations
    const fn={
      saveCustomer:()=>upsert("customers",p),
      deleteCustomer:()=>del("customers",p.id),
      saveProduct:()=>upsert("products",p),
      deleteProduct:()=>del("products",p.id),
      saveInvoice:()=>upsert("invoices",p),
      deleteInvoice:()=>del("invoices",p.id),
      saveReceipt:()=>saveReceiptLocal(p),
      deleteReceipt:()=>delReceiptLocal(p.id)
    }[action];
    if(fn){ const r=fn(); lsSet(); return res(r); }
    res(DB);
  });
}
function upsert(coll,item){ const a=DB[coll]; const i=a.findIndex(x=>x.id===item.id); if(i>=0)a[i]=item; else a.push(item); return item; }
function del(coll,id){ DB[coll]=DB[coll].filter(x=>x.id!==id); return {id}; }
function saveReceiptLocal(r){
  upsert("receipts",r);
  // mark invoices as paid
  r.invoiceIds.forEach(iid=>{ const inv=DB.invoices.find(x=>x.id===iid); if(inv){inv.status="paid"; inv.paidAt=r.date;} });
  return r;
}
function delReceiptLocal(id){
  const r=DB.receipts.find(x=>x.id===id);
  if(r) r.invoiceIds.forEach(iid=>{ const inv=DB.invoices.find(x=>x.id===iid); if(inv){inv.status="unpaid"; inv.paidAt="";} });
  DB.receipts=DB.receipts.filter(x=>x.id!==id);
  return {id};
}

/* ================= LOGIN ================= */
async function doLogin(){
  const user=$("#lUser").value.trim(), pass=$("#lPass").value;
  $("#lErr").textContent="";
  if(!user||!pass){ $("#lErr").textContent="Isi nama pengguna dan kata sandi."; return; }
  try{
    loader(true);
    const s = await (API_URL ? api("login",{user,pass}) : localFallback("login",{user,pass}));
    SESSION = s; sessionStorage.setItem("ledgerine_session",JSON.stringify(s));
    await enterApp();
  }catch(e){ $("#lErr").textContent = e.message || "Login gagal"; }
  finally{ loader(false); }
}
function doLogout(){ SESSION=null; sessionStorage.removeItem("ledgerine_session"); location.reload(); }

async function enterApp(){
  $("#login").style.display="none";
  $("#app").style.display="block";
  $("#whoami").textContent = SESSION.user;
  await api("bootstrap"); // fills DB when using backend; localFallback fills too
  go("dashboard");
}

let IEDIT=null;
function renderLines(){
  const box=$("#i_items"); box.innerHTML="";
  IEDIT.items.forEach((it,idx)=>{
    const row=document.createElement("div"); row.className="li-row";
    row.innerHTML=`
      <select onchange="onProductPick(${idx},this.value)">
        <option value="">— pilih barang —</option>
        ${DB.products.map(p=>`<option value="${p.id}"${p.id===it.productId?" selected":""}>${esc(p.name)}</option>`).join("")}
      </select>
      <input type="number" min="0" value="${it.qty}" oninput="IEDIT.items[${idx}].qty=Number(this.value)||0;calcTotals()">
      <input type="number" min="0" value="${it.price}" oninput="IEDIT.items[${idx}].price=Number(this.value)||0;calcTotals()">
      <div class="num li-sub mono" style="align-self:center" id="sub_${idx}">Rp 0</div>
      <button class="li-del" onclick="delLine(${idx})">${trashIcon()}</button>`;
    box.appendChild(row);
  });
  calcTotals();
}
function onProductPick(idx,pid){
  const p=DB.products.find(x=>x.id===pid);
  IEDIT.items[idx].productId=pid;
  if(p){ IEDIT.items[idx].price=p.price; }
  renderLines();
}
function addLine(){ IEDIT.items.push({productId:"",qty:1,price:0}); renderLines(); }
function delLine(i){ IEDIT.items.splice(i,1); if(!IEDIT.items.length)IEDIT.items.push({productId:"",qty:1,price:0}); renderLines(); }
function calcTotals(){
  let base=0;
  IEDIT.items.forEach((it,idx)=>{ const s=(it.qty||0)*(it.price||0); base+=s; const el=$("#sub_"+idx); if(el)el.textContent=rp(s); });
  const t=computeTax(base, $("#i_taxmode").value, Number($("#i_ppn").value)||0, Number($("#i_pph").value)||0);
  $("#t_sub").textContent=rp(t.subtotal);
  $("#t_ppn").textContent=rp(t.ppn);
  $("#t_pph").textContent=rp(t.pph);
  $("#t_grand").textContent=rp(t.total);
  const mode=$("#i_taxmode").value;
  $("#t_ppn_lb").textContent = mode==="inclusive"?"termasuk PPN":"PPN";
  $("#t_pph_lb").textContent = mode==="inclusive"?"Termasuk PPh":"PPh (potong)";
}
/* base = jumlah baris item.
   exclusive : total = base + PPN - PPh, subtotal = base
   inclusive : total = base (harga sudah termasuk pajak); subtotal & pajak dihitung mundur
   none      : tanpa pajak */
function computeTax(base, mode, ppnPct, pphPct){
  if(mode==="none") return {subtotal:base, ppn:0, pph:0, total:base};
  if(mode==="inclusive"){
    // total dianggap = base; pecah mundur: subtotal * (1 + ppn - pph) = total
    const factor = 1 + ppnPct/100 - pphPct/100;
    const subtotal = factor? base/factor : base;
    return {subtotal, ppn:subtotal*ppnPct/100, pph:subtotal*pphPct/100, total:base};
  }
  // exclusive
  const ppn=base*ppnPct/100, pph=base*pphPct/100;
  return {subtotal:base, ppn, pph, total:base+ppn-pph};
}
async function saveInvoice(){
  const cust=$("#i_customer").value;
  const items=IEDIT.items.filter(it=>it.productId&&it.qty>0).map(it=>{
    const p=DB.products.find(x=>x.id===it.productId);
    return {productId:it.productId,name:p?p.name:"",unit:p?p.unit:"",qty:it.qty,price:it.price,subtotal:it.qty*it.price};
  });
  if(!items.length){ toast("Tambahkan minimal 1 barang",true); return; }
  const base=items.reduce((s,i)=>s+i.subtotal,0);
  const taxMode=$("#i_taxmode").value;
  const ppnPct=Number($("#i_ppn").value)||0, pphPct=Number($("#i_pph").value)||0;
  const t=computeTax(base,taxMode,ppnPct,pphPct);
  const inv={id:IEDIT.id,number:$("#i_number").value.trim(),customerId:cust,
    date:$("#i_date").value,period:$("#i_period").value.trim(),items,
    taxMode,ppnPct,pphPct,subtotal:t.subtotal,ppn:t.ppn,pph:t.pph,total:t.total,
    notes:$("#i_notes").value.trim(),status:IEDIT.status||"unpaid",paidAt:IEDIT.paidAt||""};
  await api("saveInvoice",inv); localFallback("saveInvoice",inv);
  closeModal(); toast("Invoice tersimpan"); renderInvoices();
}

/* ================= TERBILANG (angka -> kata) ================= */
function terbilang(n){
  n=Math.floor(Math.abs(n));
  if(n===0)return "nol";
  const sat=["","satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan","sepuluh","sebelas"];
  function toWords(x){
    if(x<12)return sat[x];
    if(x<20)return toWords(x-10)+" belas";
    if(x<100)return toWords(Math.floor(x/10))+" puluh"+(x%10?" "+toWords(x%10):"");
    if(x<200)return "seratus"+(x%100?" "+toWords(x%100):"");
    if(x<1000)return toWords(Math.floor(x/100))+" ratus"+(x%100?" "+toWords(x%100):"");
    if(x<2000)return "seribu"+(x%1000?" "+toWords(x%1000):"");
    if(x<1e6)return toWords(Math.floor(x/1000))+" ribu"+(x%1000?" "+toWords(x%1000):"");
    if(x<1e9)return toWords(Math.floor(x/1e6))+" juta"+(x%1e6?" "+toWords(x%1e6):"");
    if(x<1e12)return toWords(Math.floor(x/1e9))+" miliar"+(x%1e9?" "+toWords(x%1e9):"");
    return toWords(Math.floor(x/1e12))+" triliun"+(x%1e12?" "+toWords(x%1e12):"");
  }
  const w=toWords(n).replace(/\s+/g," ").trim();
  return w.charAt(0).toUpperCase()+w.slice(1);
}

/* ================= DELETE CONFIRM ================= */
function confirmDelete(type,id){
  const map={customer:["Pelanggan","deleteCustomer","customers"],product:["Barang","deleteProduct","products"],
    invoice:["Invoice","deleteInvoice","invoices"],receipt:["Kwitansi","deleteReceipt","receipts"]};

  showModal(`
    <div class="modal-head"><h3>Hapus ${label}?</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><p style="color:var(--ink-soft);font-size:14px;line-height:1.6">
      Data ${label.toLowerCase()} ini akan dihapus permanen${type==="receipt"?". Invoice terkait akan dikembalikan ke status belum dibayar.":"."} Tindakan ini tidak dapat dibatalkan.</p></div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn danger" onclick="doDelete('${action}','${id}','${coll}')">Hapus</button></div>`);
}

  await api(action,{id}); localFallback(action,{id});

}
